<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yermakov.ai</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --v1: #2d0060;
  --v2: #5b00c8;
  --v3: #8b00ff;
  --v4: #bf5fff;
  --v5: #e8b4ff;
  --bg: #07000f;
  --glass: rgba(139,0,255,.08);
  --border: rgba(191,95,255,.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-x: hidden;
}

/* ── Canvas particles ── */
#canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── Radial glow bg ── */
.glow-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,   rgba(91,0,200,.55) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 20% 80%,  rgba(45,0,96,.6)  0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 60%,  rgba(139,0,255,.3) 0%, transparent 60%),
    var(--bg);
}

/* scanline overlay */
.scanlines {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,.08) 3px,
    rgba(0,0,0,.08) 4px
  );
  opacity: .4;
}

/* ── Card ── */
.card {
  position: relative; z-index: 2;
  width: 100%; max-width: 440px;
  padding: 52px 28px 44px;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}

/* ── Avatar ── */
.avatar-ring {
  position: relative;
  margin-bottom: 20px;
  animation: popIn .7s cubic-bezier(.34,1.56,.64,1) both;
}

.ring-svg {
  position: absolute;
  top: -10px; left: -10px;
  width: calc(100% + 20px);
  height: calc(100% + 20px);
  animation: spin 8s linear infinite;
}

.avatar {
  width: 96px; height: 96px; border-radius: 50%;
  background: linear-gradient(135deg, var(--v1), var(--v3), var(--v4));
  display: flex; align-items: center; justify-content: center;
  font-size: 42px;
  box-shadow:
    0 0 0 2px var(--bg),
    0 0 30px rgba(139,0,255,.6),
    0 0 60px rgba(139,0,255,.3),
    inset 0 1px 0 rgba(255,255,255,.15);
  position: relative; z-index: 1;
}

/* ── Name ── */
.name {
  font-family: 'Orbitron', monospace;
  font-size: 28px; font-weight: 900;
  color: #fff;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(191,95,255,.8), 0 0 40px rgba(139,0,255,.4);
  animation: fadeUp .6s .15s ease both;
  margin-bottom: 6px;
}

.name span { color: var(--v4); }

/* ── Typewriter ── */
.tagline {
  font-size: 13px;
  color: var(--v4);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
  min-height: 20px;
  margin-bottom: 18px;
  animation: fadeUp .6s .2s ease both;
}

.cursor { display: inline-block; width: 2px; height: 13px; background: var(--v4); margin-left: 2px; animation: blink .7s step-end infinite; vertical-align: middle; }

/* ── Social row ── */
.socials {
  display: flex; gap: 10px;
  margin-bottom: 28px;
  animation: fadeUp .6s .3s ease both;
}

.soc {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--glass);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--v4); text-decoration: none; font-size: 16px;
  transition: all .2s; backdrop-filter: blur(6px);
}
.soc:hover {
  background: rgba(139,0,255,.2);
  border-color: var(--v3);
  color: #fff;
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(139,0,255,.35);
}

/* ── Links ── */
.links { width: 100%; display: flex; flex-direction: column; gap: 10px; }

.link-btn {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 15px 18px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--glass);
  backdrop-filter: blur(10px);
  color: #fff; text-decoration: none;
  cursor: pointer;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  animation: fadeUp .6s ease both;
}

/* shimmer */
.link-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(191,95,255,.12), transparent);
  transition: left .5s ease;
}
.link-btn:hover::after { left: 150%; }

.link-btn:hover {
  border-color: var(--v3);
  background: rgba(139,0,255,.15);
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 8px 30px rgba(139,0,255,.25), inset 0 1px 0 rgba(255,255,255,.07);
}
.link-btn:active { transform: scale(.98); }

/* locked / coming soon */
.link-btn.locked {
  opacity: .6; cursor: default;
  border-style: dashed;
}
.link-btn.locked:hover {
  transform: none; box-shadow: none;
  border-color: var(--border);
  background: var(--glass);
}
.link-btn.locked::after { display: none; }

.link-icon {
  width: 42px; height: 42px; border-radius: 11px;
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(0,0,0,.4);
  position: relative; z-index: 1;
}

.link-text {
  display: flex; flex-direction: column;
  position: relative; z-index: 1;
  flex: 1;
}
.link-title {
  font-size: 14px; font-weight: 600;
  letter-spacing: .3px;
}
.link-sub {
  font-size: 11px; color: rgba(191,95,255,.7);
  margin-top: 2px; letter-spacing: .3px;
}

.badge {
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  letter-spacing: .5px; text-transform: uppercase;
  position: relative; z-index: 1;
  flex-shrink: 0;
}
.badge-soon {
  background: rgba(255,170,0,.1);
  border: 1px solid rgba(255,170,0,.35);
  color: #ffa500;
}
.badge-live {
  background: rgba(34,197,94,.1);
  border: 1px solid rgba(34,197,94,.35);
  color: #22c55e;
  animation: pulse-green 2s ease infinite;
}

.arrow {
  color: rgba(191,95,255,.4); font-size: 18px;
  position: relative; z-index: 1;
  transition: transform .2s, color .2s;
}
.link-btn:hover .arrow { transform: translateX(4px); color: var(--v4); }
.link-btn.locked .arrow { display: none; }

/* stagger */
.link-btn:nth-child(1) { animation-delay: .35s; }
.link-btn:nth-child(2) { animation-delay: .43s; }
.link-btn:nth-child(3) { animation-delay: .51s; }
.link-btn:nth-child(4) { animation-delay: .59s; }

/* ── Footer ── */
.footer {
  margin-top: 28px;
  font-size: 11px;
  color: rgba(191,95,255,.3);
  letter-spacing: 1.5px; text-transform: uppercase;
  animation: fadeUp .6s .7s ease both;
}

/* ── Keyframes ── */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes popIn {
  from { opacity:0; transform: scale(.6); }
  to   { opacity:1; transform: scale(1); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes blink {
  0%,100% { opacity:1; } 50% { opacity:0; }
}
@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
  50%      { box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="glow-bg"></div>
<div class="scanlines"></div>

<div class="card">

  <!-- Avatar -->
  <div class="avatar-ring">
    <svg class="ring-svg" viewBox="0 0 116 116" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="58" cy="58" r="54" stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="6 4" stroke-linecap="round"/>
      <defs>
        <linearGradient id="rg" x1="0" y1="0" x2="116" y2="116" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#8b00ff"/>
          <stop offset="50%" stop-color="#bf5fff"/>
          <stop offset="100%" stop-color="#5b00c8"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="avatar">🤖</div>
  </div>

  <!-- Name -->
  <div class="name">yermakov<span>.ai</span></div>

  <!-- Typewriter tagline -->
  <div class="tagline"><span id="tw"></span><span class="cursor"></span></div>

  <!-- Socials -->
  <div class="socials">
    <a class="soc" href="https://www.tiktok.com/@yermakov.ai" target="_blank" title="TikTok" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.78a4.85 4.85 0 0 1-1.01-.09z"/></svg>
    </a>
    <a class="soc" href="https://www.instagram.com/yermakov.ai" target="_blank" title="Instagram" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
    </a>
  </div>

  <!-- Links -->
  <div class="links">

    <!-- Free AI Tool -->
    <a class="link-btn" href="https://manus.im/invitation/VQWT4EUM7DXWPW?utm_source=invitation&utm_medium=social&utm_campaign=copy_link" target="_blank" rel="noopener"
       style="--accent-a:#5b00c8;--accent-b:#8b00ff">
      <div class="link-icon">⚡</div>
      <div class="link-text">
        <span class="link-title">Free AI Tool</span>
        <span class="link-sub">My #1 AI recommendation</span>
      </div>
      <span class="badge badge-live">Live</span>
      <span class="arrow">›</span>
    </a>

    <!-- Skool — coming soon -->
    <div class="link-btn locked"
         style="--accent-a:#1a0040;--accent-b:#3d0080">
      <div class="link-icon">🎓</div>
      <div class="link-text">
        <span class="link-title">Skool Community</span>
        <span class="link-sub">AI courses & community</span>
      </div>
      <span class="badge badge-soon">🚧 Soon</span>
    </div>

    <!-- Website — coming soon -->
    <div class="link-btn locked"
         style="--accent-a:#1a0040;--accent-b:#3d0080">
      <div class="link-icon">🌐</div>
      <div class="link-text">
        <span class="link-title">yermakov.ai website</span>
        <span class="link-sub">Full site in the works</span>
      </div>
      <span class="badge badge-soon">🚧 Soon</span>
    </div>

  </div>

  <div class="footer">© 2025 yermakov.ai · all rights reserved</div>
</div>

<script>
/* ── Typewriter ── */
const phrases = [
  'AI Creator',
  'Teaching AI',
  'Building the future',
  'On TikTok',
];
let pi = 0, ci = 0, deleting = false;
const tw = document.getElementById('tw');
function type() {
  const phrase = phrases[pi];
  tw.textContent = deleting ? phrase.slice(0, ci--) : phrase.slice(0, ci++);
  if (!deleting && ci > phrase.length)      { deleting = true; setTimeout(type, 1400); return; }
  if (deleting && ci < 0)                   { deleting = false; pi = (pi+1) % phrases.length; ci = 0; }
  setTimeout(type, deleting ? 45 : 80);
}
type();

/* ── Particles ── */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : H + 10;
    this.r  = Math.random() * 1.5 + .4;
    this.vy = -(Math.random() * .4 + .15);
    this.vx = (Math.random() - .5) * .2;
    this.o  = Math.random() * .5 + .1;
    const hue = 270 + Math.random() * 40 - 20;
    this.color = `hsla(${hue},100%,70%,${this.o})`;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.y < -10) this.reset(false);
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

for (let i = 0; i < 90; i++) particles.push(new Particle());

function loop() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
